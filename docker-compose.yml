services:
  postgres:
    image: postgres:16-alpine
    container_name: agrilink-postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: agrilink
      POSTGRES_USER: agrilink
      POSTGRES_PASSWORD: agrilink_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrilink -d agrilink"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agrilink-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrilink-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://agrilink:agrilink_secret@postgres:5432/agrilink?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "agrilink-super-secret-jwt-key-2024"
      JWT_EXPIRES_IN: "7d"
      PORT: "5000"
      CORS_ORIGIN: "http://localhost:5173"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME:-your-cloud-name}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY:-your-api-key}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET:-your-api-secret}"
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID:-your-firebase-project}"
      FIREBASE_PRIVATE_KEY: "${FIREBASE_PRIVATE_KEY:-your-private-key}"
      FIREBASE_CLIENT_EMAIL: "${FIREBASE_CLIENT_EMAIL:-your-client-email}"
      MANDI_API_KEY: "${MANDI_API_KEY:-your-mandi-api-key}"
      NODE_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
